name: Phase 6 Full Scanner Automation

on:
  workflow_dispatch:
  schedule:
    # US market schedule in UTC during daylight saving time.
    # Pre-market: 08:30 ET
    - cron: "30 12 * * 1-5"
    # Opening reaction window: 09:45 ET
    - cron: "45 13 * * 1-5"
    # Midday: 12:30 ET
    - cron: "30 16 * * 1-5"
    # Power hour: 15:15 ET
    - cron: "15 19 * * 1-5"

jobs:
  phase6-full-automation:
    runs-on: ubuntu-latest
    concurrency:
      group: phase6-full-scanner-automation
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Full Scanner Pipeline
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python sniper_scanner/phase6_full_pipeline.py

      - name: Upload Full Automation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-full-automation
          if-no-files-found: error
          path: |
            phase6_pipeline_summary.json
            Final_Signals.md
            Final_Signals.csv
            phase5_execution_summary.json
            Ranked_Opportunities.csv
            phase4_ranking_summary.json
            Raw_Live_Metrics.csv
            phase3_signal_summary.json
            phase3_query_meta.csv
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv
