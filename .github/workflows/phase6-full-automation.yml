name: Phase 6 Full Pipeline (manual only)

on:
  workflow_dispatch:

jobs:
  phase6-full-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Full Scanner Pipeline
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python sniper_scanner/phase6_full_pipeline.py

      - name: Upload Full Automation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-full-automation
          if-no-files-found: error
          path: |
            phase6_pipeline_summary.json
            Final_Signals.md
            Final_Signals.csv
            phase5_execution_summary.json
            Ranked_Opportunities.csv
            phase4_ranking_summary.json
            Raw_Live_Metrics.csv
            phase3_signal_summary.json
            phase3_query_meta.csv
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv
