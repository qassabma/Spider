name: Initiate Scan

on:
  workflow_dispatch:

jobs:
  initiate-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify SpiderRock API key
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python - << 'PY'
          import os
          import sys
          import requests

          key = os.getenv("SPIDERROCK_API_KEY", "")
          if not key:
              print("ERROR: SPIDERROCK_API_KEY secret is missing or empty")
              sys.exit(1)

          url = (
              "https://mlink-live.nms.saturn.spiderrockconnect.com/"
              "rest/json?cmd=getmsgtypes&apikey=" + key
          )
          r = requests.get(url, timeout=30)
          print("HTTP_STATUS =", r.status_code)
          if r.status_code != 200:
              print(r.text[:2000])
              sys.exit(1)
          print("API key verified")
          PY

      - name: Run full scan pipeline (Phase 3 → 4 → 5)
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python sniper_scanner/phase6_full_pipeline.py

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          if-no-files-found: warn
          path: |
            phase6_pipeline_summary.json
            Final_Signals.md
            Final_Signals.csv
            phase5_execution_summary.json
            Ranked_Opportunities.csv
            phase4_ranking_summary.json
            Raw_Live_Metrics.csv
            phase3_signal_summary.json
            phase3_query_meta.csv
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv
