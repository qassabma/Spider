name: Initiate Scan

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "edge = 62 tickers x 6 msgs (~5-8 min) | full = 72 tickers x 11 msgs (~60 min)"
        required: true
        default: edge
        type: choice
        options:
          - edge
          - full

jobs:
  initiate-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify SpiderRock API key
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python - << 'PY'
          import os
          import sys
          import requests

          key = os.getenv("SPIDERROCK_API_KEY", "")
          if not key:
              print("ERROR: SPIDERROCK_API_KEY secret is missing or empty")
              sys.exit(1)

          url = (
              "https://mlink-live.nms.saturn.spiderrockconnect.com/"
              "rest/json?cmd=getmsgtypes&apikey=" + key
          )
          r = requests.get(url, timeout=30)
          print("HTTP_STATUS =", r.status_code)
          if r.status_code != 200:
              print(r.text[:2000])
              sys.exit(1)
          print("API key verified")
          PY

      - name: Run EDGE scan (fast)
        if: inputs.scan_mode == 'edge'
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "MODE=EDGE_FAST (62 tickers x 6 messages = 372 API calls, ~5-8 min)"
          python -u sniper_scanner/edge_scan_pipeline.py

      - name: Run FULL harvest (slow)
        if: inputs.scan_mode == 'full'
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "MODE=FULL_HARVEST (72 tickers x 11 messages = 792 API calls, ~30-60 min)"
          python -u sniper_scanner/phase6_full_pipeline.py

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ inputs.scan_mode }}
          if-no-files-found: ignore
          path: |
            edge_scan_summary.json
            phase6_pipeline_summary.json
            Final_Signals.md
            Final_Signals.csv
            phase5_execution_summary.json
            Ranked_Opportunities.csv
            phase4_ranking_summary.json
            Raw_Live_Metrics.csv
            phase3_signal_summary.json
            phase3_query_meta.csv
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv
