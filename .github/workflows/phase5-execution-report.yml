name: Phase 5 Execution Report

on:
  workflow_dispatch:

jobs:
  phase5-execution-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Phase 5 Execution Report
        run: |
          python sniper_scanner/phase5_execution_report.py

      - name: Upload Phase 5 Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-execution-report
          if-no-files-found: error
          path: |
            Final_Signals.md
            Final_Signals.csv
            phase5_execution_summary.json
            Ranked_Opportunities.csv
            phase4_ranking_summary.json
            Raw_Live_Metrics.csv
