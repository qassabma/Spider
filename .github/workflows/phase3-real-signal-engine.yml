name: Phase 3 Real Signal Engine

on:
  workflow_dispatch:

jobs:
  phase3-real-signal-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Phase 3 Real Signal Engine
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python sniper_scanner/phase3_signal_engine.py

      - name: Upload Phase 3 Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-real-signal-engine
          if-no-files-found: error
          path: |
            Raw_Live_Metrics.csv
            phase3_query_meta.csv
            phase3_signal_summary.json
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv
            phase3_raw_live/*.json
