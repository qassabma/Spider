name: Sniper Scanner Automation

on:
  workflow_dispatch:

jobs:
  run-sniper-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sniper Scanner
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python sniper_scanner/scanner.py

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: |
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv