name: Sniper Scanner Automation

on:
  workflow_dispatch:

jobs:
  run-sniper-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify SpiderRock API
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
        run: |
          python - << 'PY'
          import os
          import sys
          import requests

          key = os.getenv("SPIDERROCK_API_KEY", "")
          if not key:
              print("ERROR: SPIDERROCK_API_KEY secret is missing or empty")
              sys.exit(1)

          url = (
              "https://mlink-live.nms.saturn.spiderrockconnect.com/"
              "rest/json?cmd=getmsgtypes&apikey=" + key
          )
          r = requests.get(url, timeout=30)
          print("HTTP_STATUS =", r.status_code)
          print("RESPONSE_LENGTH =", len(r.text))

          with open("response.json", "w", encoding="utf-8") as f:
              f.write(r.text)

          if r.status_code != 200:
              print(r.text[:2000])
              sys.exit(1)
          PY

      - name: Run EDGE scan pipeline
        env:
          SPIDERROCK_API_KEY: ${{ secrets.SPIDERROCK_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u sniper_scanner/edge_scan_pipeline.py

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sniper-scan-results
          if-no-files-found: warn
          path: |
            edge_scan_summary.json
            phase6_pipeline_summary.json
            Final_Signals.md
            Final_Signals.csv
            phase5_execution_summary.json
            Ranked_Opportunities.csv
            phase4_ranking_summary.json
            Raw_Live_Metrics.csv
            phase3_signal_summary.json
            phase3_query_meta.csv
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv
