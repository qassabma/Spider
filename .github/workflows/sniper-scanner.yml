name: Sniper Scanner Workflow

on:
  push:
    branches:
      - main

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sniper Scanner
        run: |
          python sniper_scanner/scanner.py

      - name: Upload Scan Results
        uses: actions/upload-artifact@v3
        with:
          name: scan-reports
          path: |
            Cheap_Calls.csv
            Cheap_Puts.csv
            Short_Stocks.csv
            Airpockets.csv